<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel IA - Trámites Alejandro</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:30px; }
    .box { max-width:800px; margin:auto; background:#111827; padding:25px; border-radius:18px; }
    input, textarea { width:100%; padding:14px; margin:10px 0; border-radius:10px; border:none; }
    textarea { height:160px; }
    button { background:#22c55e; color:white; padding:14px 22px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; }
    .item { background:#1f2937; margin-top:15px; padding:15px; border-radius:12px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Entrenar IA - Trámites Alejandro</h1>

    <label>Palabra clave o pregunta</label>
    <input id="keyword" placeholder="Ej: visado familiar, legalización, LMD">

    <label>Respuesta que debe dar la IA</label>
    <textarea id="answer" placeholder="Escribe aquí la respuesta exacta..."></textarea>

    <button onclick="saveKnowledge()">Guardar respuesta</button>

    <h2>Respuestas guardadas</h2>
    <div id="list"></div>
  </div>

  <script>
    function getKnowledge() {
      return JSON.parse(localStorage.getItem('ta_knowledge') || '[]');
    }

    function saveKnowledge() {
      const keyword = document.getElementById('keyword').value.trim();
      const answer = document.getElementById('answer').value.trim();

      if (!keyword || !answer) {
        alert('Debes poner palabra clave y respuesta.');
        return;
      }

      const knowledge = getKnowledge();
      knowledge.push({ keyword, answer });
      localStorage.setItem('ta_knowledge', JSON.stringify(knowledge));

      document.getElementById('keyword').value = '';
      document.getElementById('answer').value = '';

      renderKnowledge();
      alert('Respuesta guardada.');
    }

    function deleteKnowledge(index) {
      const knowledge = getKnowledge();
      knowledge.splice(index, 1);
      localStorage.setItem('ta_knowledge', JSON.stringify(knowledge));
      renderKnowledge();
    }

    function renderKnowledge() {
      const list = document.getElementById('list');
      const knowledge = getKnowledge();

      list.innerHTML = knowledge.map((item, index) => `
        <div class="item">
          <strong>${item.keyword}</strong>
          <p>${item.answer}</p>
          <button onclick="deleteKnowledge(${index})">Eliminar</button>
        </div>
      `).join('');
    }

    renderKnowledge();
  </script>
</body>
</html>
